<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Grace Planner</title>

<style>

:root{
  --bg:#f6f2ea;
  --bg2:#efe7da;
  --surface:rgba(255,255,255,.62);
  --surface-solid:#ffffff;
  --text:#231f1b;
  --muted:#857c73;
  --line:rgba(0,0,0,.05);
  --accent:#c7a57d;
  --accent-soft:#efe2d0;
  --shadow:0 20px 60px rgba(0,0,0,.08);
  --radius:30px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",sans-serif;
  background:linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
}

body{
  transition:.5s ease;
}

.app{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.page{
  position:absolute;
  inset:0;
  overflow-y:auto;
  padding:28px 22px 160px;
  opacity:0;
  pointer-events:none;
  transform:translateY(14px);
  transition:.45s cubic-bezier(.2,.8,.2,1);
}

.page.active{
  opacity:1;
  pointer-events:auto;
  transform:none;
}

.hero-date{
  font-size:14px;
  color:var(--muted);
  margin-bottom:10px;
  letter-spacing:.3px;
}

.hero-title{
  font-size:42px;
  line-height:.95;
  font-weight:700;
  letter-spacing:-2px;
  margin-bottom:14px;
}

.hero-sub{
  font-size:15px;
  line-height:1.8;
  color:var(--muted);
  max-width:90%;
}

.glass{
  background:var(--surface);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.35);
  box-shadow:var(--shadow);
}

.section{
  margin-top:34px;
}

.section-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.section-title{
  font-size:22px;
  font-weight:650;
  letter-spacing:-1px;
}

.section-link{
  font-size:14px;
  color:var(--muted);
}

.card{
  border-radius:32px;
  padding:24px;
}

.verse-card{
  position:relative;
  overflow:hidden;
}

.verse-card::before{
  content:"";
  position:absolute;
  inset:-20%;
  background:
  radial-gradient(circle at top right,
  rgba(255,255,255,.6),
  transparent 45%);
  pointer-events:none;
}

.verse-text{
  font-size:21px;
  line-height:1.55;
  letter-spacing:-.6px;
  margin-bottom:16px;
}

.verse-ref{
  color:var(--muted);
  font-size:14px;
}

.today-list{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.today-item{
  display:flex;
  gap:14px;
  align-items:flex-start;
  padding:18px;
  border-radius:26px;
  background:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.35);
}

.check{
  width:26px;
  height:26px;
  border-radius:50%;
  border:2px solid var(--accent);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.25s ease;
  margin-top:2px;
}

.check.active{
  background:var(--accent);
  color:white;
}

.today-title{
  font-size:16px;
  font-weight:600;
  margin-bottom:5px;
}

.today-sub{
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
}

.empty{
  padding:30px 10px;
  text-align:center;
  color:var(--muted);
  line-height:1.8;
}

.tracker-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.tracker{
  padding:22px;
  border-radius:28px;
  background:rgba(255,255,255,.46);
  border:1px solid rgba(255,255,255,.3);
}

.tracker-emoji{
  font-size:26px;
  margin-bottom:16px;
}

.tracker-value{
  font-size:34px;
  font-weight:700;
  letter-spacing:-1px;
  margin-bottom:4px;
}

.tracker-label{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}

.week-scroll{
  display:flex;
  gap:14px;
  overflow-x:auto;
  padding-bottom:6px;
}

.day-pill{
  min-width:82px;
  padding:20px 14px;
  border-radius:28px;
  text-align:center;
  cursor:pointer;
}

.day-name{
  color:var(--muted);
  font-size:13px;
  margin-bottom:10px;
}

.day-number{
  font-size:24px;
  font-weight:700;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.calendar-day{
  aspect-ratio:1/1;
  border-radius:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  position:relative;
  cursor:pointer;
}

.calendar-day.has::after{
  content:"";
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--accent);
  position:absolute;
  bottom:10px;
}

.entry{
  margin-bottom:18px;
}

.entry-date{
  font-size:13px;
  color:var(--muted);
  margin-bottom:12px;
}

.entry-content{
  font-size:15px;
  line-height:1.9;
  white-space:pre-wrap;
}

.mood{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.45);
  margin-bottom:18px;
  font-size:13px;
}

.theme-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.theme-card{
  padding:24px;
  border-radius:30px;
  cursor:pointer;
}

.theme-card h3{
  font-size:18px;
  margin-bottom:10px;
}

.theme-card p{
  font-size:13px;
  line-height:1.7;
  color:var(--muted);
}

.bottom-nav{
  position:fixed;
  left:18px;
  right:18px;
  bottom:18px;
  height:78px;
  border-radius:34px;
  background:rgba(255,255,255,.55);
  backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.5);
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:50;
  box-shadow:0 20px 60px rgba(0,0,0,.1);
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  color:var(--muted);
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:.3s ease;
  flex:1;
}

.nav-item.active{
  color:var(--text);
  transform:translateY(-2px);
}

.nav-icon{
  font-size:20px;
}

.fab{
  position:fixed;
  right:26px;
  bottom:120px;
  width:66px;
  height:66px;
  border-radius:50%;
  background:var(--surface-solid);
  box-shadow:0 20px 50px rgba(0,0,0,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
  z-index:60;
  transition:.25s ease;
}

.fab:active{
  transform:scale(.94);
}

.sheet-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.2);
  backdrop-filter:blur(8px);
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
  z-index:90;
}

.sheet-overlay.active{
  opacity:1;
  pointer-events:auto;
}

.sheet{
  position:fixed;
  left:0;
  right:0;
  bottom:-100%;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(30px);
  border-radius:38px 38px 0 0;
  padding:22px 22px 40px;
  transition:.45s cubic-bezier(.2,.8,.2,1);
  z-index:100;
  max-height:88vh;
  overflow-y:auto;
}

.sheet.active{
  bottom:0;
}

.handle{
  width:64px;
  height:6px;
  border-radius:999px;
  background:rgba(0,0,0,.08);
  margin:0 auto 24px;
}

.input, textarea, select{
  width:100%;
  border:none;
  outline:none;
  background:rgba(245,245,245,.9);
  border-radius:24px;
  padding:18px;
  margin-bottom:14px;
  font-size:15px;
  color:var(--text);
}

textarea{
  min-height:120px;
  resize:none;
}

.button{
  width:100%;
  border:none;
  background:var(--text);
  color:white;
  border-radius:24px;
  padding:18px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
}

.switch-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 0;
  border-bottom:1px solid var(--line);
}

.switch{
  width:56px;
  height:32px;
  border-radius:999px;
  background:#d7d2cb;
  position:relative;
  cursor:pointer;
  transition:.25s ease;
}

.switch::after{
  content:"";
  width:24px;
  height:24px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:4px;
  left:4px;
  transition:.25s ease;
}

.switch.active{
  background:var(--accent);
}

.switch.active::after{
  transform:translateX(24px);
}

.onboarding{
  position:fixed;
  inset:0;
  background:
  radial-gradient(circle at top,
  rgba(255,255,255,.7),
  transparent 35%),
  linear-gradient(180deg,var(--bg),var(--bg2));
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  z-index:300;
  transition:.5s ease;
}

.onboarding.hidden{
  opacity:0;
  pointer-events:none;
}

.onboard-card{
  width:100%;
  max-width:420px;
}

.big-logo{
  font-size:52px;
  margin-bottom:18px;
}

.onboard-title{
  font-size:44px;
  line-height:.95;
  letter-spacing:-2px;
  margin-bottom:16px;
}

.onboard-sub{
  line-height:1.8;
  color:var(--muted);
  margin-bottom:28px;
}

.theme-picker{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:22px;
}

.theme-dot{
  aspect-ratio:1/1;
  border-radius:20px;
  cursor:pointer;
  border:3px solid transparent;
}

.theme-dot.active{
  border-color:white;
  box-shadow:0 0 0 2px rgba(0,0,0,.12);
}

.note{
  width:100%;
  border:none;
  background:rgba(255,255,255,.5);
  border-radius:30px;
  padding:22px;
  min-height:120px;
  outline:none;
  color:var(--text);
  line-height:1.8;
}

.fade{
  animation:fade .4s ease;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:none;
  }
}

</style>
</head>
<body>

<div class="app">

  <div id="home" class="page active"></div>
  <div id="planner" class="page"></div>
  <div id="journal" class="page"></div>
  <div id="prayers" class="page"></div>
  <div id="settings" class="page"></div>

  <div class="fab" id="fab">＋</div>

  <div class="bottom-nav glass">

    <div class="nav-item active" data-page="home">
      <div class="nav-icon">⌂</div>
      <span>Home</span>
    </div>

    <div class="nav-item" data-page="planner">
      <div class="nav-icon">◫</div>
      <span>Planner</span>
    </div>

    <div class="nav-item" data-page="journal">
      <div class="nav-icon">✎</div>
      <span>Journal</span>
    </div>

    <div class="nav-item" data-page="prayers">
      <div class="nav-icon">🙏</div>
      <span>Prières</span>
    </div>

    <div class="nav-item" data-page="settings">
      <div class="nav-icon">⚙</div>
      <span>Settings</span>
    </div>

  </div>

</div>

<div class="sheet-overlay" id="overlay"></div>

<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div id="sheetContent"></div>
</div>

<div class="onboarding" id="onboarding">
  <div class="onboard-card">

    <div class="big-logo">✨</div>

    <div class="onboard-title">
      Grace<br>
      Planner
    </div>

    <div class="onboard-sub">
      Organisez votre vie spirituelle avec paix,
      douceur et cohérence.
    </div>

    <input
      class="input"
      id="nameInput"
      placeholder="Votre prénom"
    >

    <div class="theme-picker">

      <div class="theme-dot active"
      data-theme="sand"
      style="background:#d8c1a0"></div>

      <div class="theme-dot"
      data-theme="rose"
      style="background:#d6adb2"></div>

      <div class="theme-dot"
      data-theme="sage"
      style="background:#aab6a2"></div>

      <div class="theme-dot"
      data-theme="dark"
      style="background:#1c1d22"></div>

      <div class="theme-dot"
      data-theme="night"
      style="background:#28344a"></div>

    </div>

    <button class="button" onclick="finishOnboarding()">
      Continuer
    </button>

  </div>
</div>

<script>

const state = {
  profile:{},
  planner:{},
  journal:[],
  prayers:[],
  settings:{
    theme:"sand",
    notifications:{
      prayer:true,
      meditation:true,
      meeting:false,
      worship:true,
      encouragement:true,
      fasting:false
    }
  },
  completed:{},
  notes:{}
};

const themes = {

  sand:{
    bg:"#f7f2eb",
    bg2:"#efe6d9",
    surface:"rgba(255,255,255,.62)",
    text:"#231f1b",
    muted:"#857c73",
    accent:"#c6a37d",
    accentSoft:"#efe2d1"
  },

  rose:{
    bg:"#f8f0f1",
    bg2:"#f1e2e5",
    surface:"rgba(255,255,255,.6)",
    text:"#2b2324",
    muted:"#8a7578",
    accent:"#cb99a2",
    accentSoft:"#f0dce0"
  },

  sage:{
    bg:"#edf1ec",
    bg2:"#e1e7df",
    surface:"rgba(255,255,255,.58)",
    text:"#263026",
    muted:"#738072",
    accent:"#8ea18b",
    accentSoft:"#dce5d8"
  },

  dark:{
    bg:"#111316",
    bg2:"#181a1e",
    surface:"rgba(31,33,37,.7)",
    text:"#f5f5f5",
    muted:"#9da0a8",
    accent:"#c8a16d",
    accentSoft:"#2f2a23"
  },

  night:{
    bg:"#101a28",
    bg2:"#182334",
    surface:"rgba(29,40,58,.7)",
    text:"#eef3fa",
    muted:"#9eacbc",
    accent:"#7c96c6",
    accentSoft:"#2a3b56"
  }

};

function save(){
  localStorage.setItem("gracePlannerV2",JSON.stringify(state));
}

function load(){

  const saved = localStorage.getItem("gracePlannerV2");

  if(saved){
    Object.assign(state,JSON.parse(saved));
  }

}

load();

function applyTheme(name){

  const t = themes[name];

  document.documentElement.style.setProperty("--bg",t.bg);
  document.documentElement.style.setProperty("--bg2",t.bg2);
  document.documentElement.style.setProperty("--surface",t.surface);
  document.documentElement.style.setProperty("--text",t.text);
  document.documentElement.style.setProperty("--muted",t.muted);
  document.documentElement.style.setProperty("--accent",t.accent);
  document.documentElement.style.setProperty("--accent-soft",t.accentSoft);

  state.settings.theme = name;

  save();
}

applyTheme(state.settings.theme || "sand");

if(state.profile.name){
  document.getElementById("onboarding")
  .classList.add("hidden");
}

let selectedTheme = "sand";

document.querySelectorAll(".theme-dot")
.forEach(dot=>{

  dot.onclick=()=>{

    document.querySelectorAll(".theme-dot")
    .forEach(d=>d.classList.remove("active"));

    dot.classList.add("active");

    selectedTheme = dot.dataset.theme;

  };

});

function finishOnboarding(){

  const name =
  document.getElementById("nameInput")
  .value.trim();

  if(!name) return;

  state.profile.name = name;

  applyTheme(selectedTheme);

  save();

  document.getElementById("onboarding")
  .classList.add("hidden");

  renderAll();

}

function dateKey(d){
  return d.toISOString().split("T")[0];
}

function todayKey(){
  return dateKey(new Date());
}

function formatLongDate(d){

  return new Intl.DateTimeFormat("fr-FR",{
    weekday:"long",
    day:"numeric",
    month:"long"
  }).format(d);

}

function getTodayItems(){
  return state.planner[todayKey()] || [];
}

function renderHome(){

  const home =
  document.getElementById("home");

  const todayItems =
  getTodayItems();

  let prayer=0;
  let meditation=0;
  let teaching=0;
  let fasting=0;

  Object.values(state.completed)
  .flat()
  .forEach(t=>{

    if(t.type==="Prière") prayer++;
    if(t.type==="Méditation") meditation++;
    if(t.type==="Enseignement") teaching++;
    if(t.type==="Jeûne") fasting++;

  });

  home.innerHTML = `

    <div class="hero-date">
      ${formatLongDate(new Date())}
    </div>

    <div class="hero-title">
      Bonjour<br>
      ${state.profile.name || ""}
    </div>

    <div class="hero-sub">
      Que cette journée soit remplie de paix,
      de présence et de grâce.
    </div>

    <div class="section">

      <div class="card verse-card glass">

        <div class="verse-text">
          “Que tout ce que vous faites
          soit fait avec amour.”
        </div>

        <div class="verse-ref">
          1 Corinthiens 16:14
        </div>

      </div>

    </div>

    <div class="section">

      <div class="section-header">
        <div class="section-title">
          Aujourd’hui
        </div>
      </div>

      <div class="today-list">

      ${
        todayItems.length
        ? todayItems.map(item=>{

          const done =
          (state.completed[todayKey()]||[])
          .find(t=>t.id===item.id);

          return `
            <div class="today-item glass fade">

              <div class="check
              ${done ? 'active':''}"
              onclick="toggleDone('${item.id}')">

              ${done ? '✓':''}

              </div>

              <div>

                <div class="today-title">
                  ${item.type}
                </div>

                <div class="today-sub">
                  ${item.content || 'Sans note'}
                </div>

              </div>

            </div>
          `;

        }).join("")
        :
        `
        <div class="card glass empty">
          Aucune activité planifiée aujourd’hui.
        </div>
        `
      }

      </div>

    </div>

    <div class="section">

      <div class="section-header">
        <div class="section-title">
          Note personnelle
        </div>
      </div>

      <textarea
      class="note glass"
      placeholder="Écrivez ce que Dieu met sur votre cœur..."
      oninput="saveNote(this.value)"
      >${state.notes[todayKey()] || ""}</textarea>

    </div>

    <div class="section">

      <div class="section-header">
        <div class="section-title">
          Ma semaine avec Dieu ✨
        </div>
      </div>

      <div class="tracker-grid">

        <div class="tracker glass">
          <div class="tracker-emoji">🙏</div>
          <div class="tracker-value">${prayer}</div>
          <div class="tracker-label">
            Prières réalisées
          </div>
        </div>

        <div class="tracker glass">
          <div class="tracker-emoji">📖</div>
          <div class="tracker-value">${meditation}</div>
          <div class="tracker-label">
            Méditations vécues
          </div>
        </div>

        <div class="tracker glass">
          <div class="tracker-emoji">🎧</div>
          <div class="tracker-value">${teaching}</div>
          <div class="tracker-label">
            Enseignements suivis
          </div>
        </div>

        <div class="tracker glass">
          <div class="tracker-emoji">🔥</div>
          <div class="tracker-value">${fasting}</div>
          <div class="tracker-label">
            Temps de jeûne réalisés
          </div>
        </div>

      </div>

    </div>

  `;

}

function toggleDone(id){

  const key = todayKey();

  if(!state.completed[key])
  state.completed[key]=[];

  const exists =
  state.completed[key].find(t=>t.id===id);

  if(exists){

    state.completed[key] =
    state.completed[key]
    .filter(t=>t.id!==id);

  }else{

    const task =
    (state.planner[key] || [])
    .find(t=>t.id===id);

    state.completed[key].push(task);

  }

  save();

  renderHome();

}

function saveNote(v){

  state.notes[todayKey()] = v;

  save();

}

function renderPlanner(){

  const planner =
  document.getElementById("planner");

  const now = new Date();

  let week = "";

  for(let i=0;i<7;i++){

    const d = new Date();

    d.setDate(
      now.getDate() - now.getDay() + i + 1
    );

    const key = dateKey(d);

    week += `
      <div class="day-pill glass"
      onclick="openPlannerDay('${key}')">

        <div class="day-name">
          ${d.toLocaleDateString('fr-FR',{
            weekday:'short'
          })}
        </div>

        <div class="day-number">
          ${d.getDate()}
        </div>

      </div>
    `;
  }

  const y = now.getFullYear();
  const m = now.getMonth();

  const first =
  new Date(y,m,1).getDay();

  const total =
  new Date(y,m+1,0).getDate();

  let cal = "";

  for(let i=0;i<first-1;i++){
    cal += `<div></div>`;
  }

  for(let d=1;d<=total;d++){

    const date =
    new Date(y,m,d);

    const key = dateKey(date);

    const has =
    state.planner[key] &&
    state.planner[key].length;

    cal += `
      <div
      class="calendar-day glass
      ${has ? 'has':''}"
      onclick="openPlannerDay('${key}')">

      ${d}

      </div>
    `;
  }

  planner.innerHTML = `

    <div class="hero-date">
      Planner spirituel
    </div>

    <div class="hero-title">
      Organiser<br>
      avec paix
    </div>

    <div class="hero-sub">
      Préparez vos temps de prière,
      méditation et réunions spirituelles.
    </div>

    <div class="section">

      <div class="section-header">
        <div class="section-title">
          Cette semaine
        </div>
      </div>

      <div class="week-scroll">
        ${week}
      </div>

    </div>

    <div class="section">

      <div class="section-header">
        <div class="section-title">
          ${now.toLocaleDateString('fr-FR',{
            month:'long',
            year:'numeric'
          })}
        </div>
      </div>

      <div class="calendar">
        ${cal}
      </div>

    </div>

  `;

}

function openPlannerDay(key){

  const items =
  state.planner[key] || [];

  openSheet(`

    <div class="section-title"
    style="margin-bottom:22px">

    ${new Date(key).toLocaleDateString('fr-FR',{
      weekday:'long',
      day:'numeric',
      month:'long'
    })}

    </div>

    ${
      items.length
      ? items.map(item=>`
        <div class="today-item glass">

          <div>

            <div class="today-title">
              ${item.type}
            </div>

            <div class="today-sub">
              ${item.content || ''}
            </div>

          </div>

        </div>
      `).join("")
      :
      `
      <div class="empty">
        Aucune activité planifiée.
      </div>
      `
    }

    <select id="planType">

      <option>Prière</option>
      <option>Méditation</option>
      <option>Enseignement</option>
      <option>Réunion</option>
      <option>Jeûne</option>
      <option>Objectif</option>
      <option>Note</option>

    </select>

    <textarea
    id="planContent"
    placeholder="Ajouter une intention ou une note..."></textarea>

    <button
    class="button"
    onclick="savePlan('${key}')">

    Ajouter au planner

    </button>

  `);

}

function savePlan(key){

  const type =
  document.getElementById("planType").value;

  const content =
  document.getElementById("planContent")
  .value.trim();

  if(!state.planner[key])
  state.planner[key]=[];

  state.planner[key].push({
    id:Date.now().toString(),
    type,
    content
  });

  save();

  closeSheet();

  renderPlanner();
  renderHome();

}

function renderJournal(){

  const journal =
  document.getElementById("journal");

  journal.innerHTML = `

    <div class="hero-date">
      Journal spirituel
    </div>

    <div class="hero-title">
      Écrire<br>
      avec sincérité
    </div>

    <div class="hero-sub">
      Gardez une trace de vos pensées,
      prières et émotions.
    </div>

    <div class="section">

      ${
        state.journal.length
        ? state.journal.slice().reverse()
        .map(entry=>`

          <div class="card glass entry fade">

            <div class="entry-date">
              ${new Date(entry.date)
              .toLocaleDateString('fr-FR',{
                weekday:'long',
                day:'numeric',
                month:'long',
                hour:'2-digit',
                minute:'2-digit'
              })}
            </div>

            <div class="mood">
              ${entry.mood}
              ${entry.moodLabel}
            </div>

            <div class="entry-content">
              ${entry.content}
            </div>

          </div>

        `).join("")
        :
        `
        <div class="card glass empty">
          Votre journal est vide pour le moment.
        </div>
        `
      }

    </div>

  `;

}

function openJournal(){

  openSheet(`

    <div class="section-title"
    style="margin-bottom:24px">

    Nouvelle entrée

    </div>

    <select id="mood">

      <option value="🙂|Paisible">
        🙂 Paisible
      </option>

      <option value="🙏|Reconnaissant">
        🙏 Reconnaissant
      </option>

      <option value="✨|Inspiré">
        ✨ Inspiré
      </option>

      <option value="💭|Pensif">
        💭 Pensif
      </option>

    </select>

    <textarea
    id="journalText"
    placeholder="Écrivez librement..."></textarea>

    <button
    class="button"
    onclick="saveJournal()">

    Ajouter au journal

    </button>

  `);

}

function saveJournal(){

  const text =
  document.getElementById("journalText")
  .value.trim();

  if(!text) return;

  const mood =
  document.getElementById("mood").value
  .split("|");

  state.journal.push({

    id:Date.now().toString(),
    content:text,
    date:new Date().toISOString(),
    mood:mood[0],
    moodLabel:mood[1]

  });

  save();

  closeSheet();

  renderJournal();

}

function renderPrayers(){

  const prayers =
  document.getElementById("prayers");

  prayers.innerHTML = `

    <div class="hero-date">
      Vie de prière
    </div>

    <div class="hero-title">
      Déposer<br>
      avec foi
    </div>

    <div class="hero-sub">
      Organisez vos sujets de prière
      et gardez mémoire des réponses.
    </div>

    <div class="section">

      ${
        state.prayers.length
        ? `
        <div class="theme-grid">

        ${state.prayers.map(t=>`

          <div
          class="theme-card glass"
          onclick="openPrayerTheme('${t.id}')">

            <h3>${t.name}</h3>

            <p>
              ${
                t.items.filter(i=>!i.answered)
                .length
              }
              sujet(s) actifs
            </p>

          </div>

        `).join("")}

        </div>
        `
        :
        `
        <div class="card glass empty">
          Aucun thème de prière créé.
        </div>
        `
      }

    </div>

  `;

}

function newPrayerTheme(){

  openSheet(`

    <div class="section-title"
    style="margin-bottom:24px">

    Nouveau thème

    </div>

    <input
    id="themeName"
    placeholder="Famille, Travail, Église...">

    <button
    class="button"
    onclick="savePrayerTheme()">

    Créer

    </button>

  `);

}

function savePrayerTheme(){

  const name =
  document.getElementById("themeName")
  .value.trim();

  if(!name) return;

  state.prayers.push({

    id:Date.now().toString(),
    name,
    items:[]

  });

  save();

  closeSheet();

  renderPrayers();

}

function openPrayerTheme(id){

  const theme =
  state.prayers.find(t=>t.id===id);

  openSheet(`

    <div class="section-title"
    style="margin-bottom:24px">

    ${theme.name}

    </div>

    ${
      theme.items.filter(i=>!i.answered)
      .length
      ? theme.items
      .filter(i=>!i.answered)
      .map(item=>`

        <div class="today-item glass">

          <div
          class="check
          ${item.checked ? 'active':''}"
          onclick="togglePrayer('${id}','${item.id}')">

          ${item.checked ? '✓':''}

          </div>

          <div>

            <div class="today-title">
              ${item.text}
            </div>

            <div style="margin-top:12px">

              <button
              class="button"
              style="
              padding:12px;
              border-radius:18px;
              font-size:13px"
              onclick="answerPrayer('${id}','${item.id}')">

              Marquer exaucée ✨

              </button>

            </div>

          </div>

        </div>

      `).join("")
      :
      `
      <div class="empty">
        Aucun sujet actif.
      </div>
      `
    }

    <div class="section">

      <div class="section-title"
      style="margin-bottom:16px">

      Dieu a répondu ici ✨

      </div>

      ${
        theme.items.filter(i=>i.answered)
        .length
        ? theme.items
        .filter(i=>i.answered)
        .map(i=>`
          <div class="today-item glass">
            ${i.text}
          </div>
        `).join("")
        :
        `
        <div class="empty">
          Aucun sujet exaucé pour le moment.
        </div>
        `
      }

    </div>

    <input
    id="prayerInput"
    placeholder="Ajouter un sujet de prière">

    <button
    class="button"
    onclick="savePrayerItem('${id}')">

    Ajouter

    </button>

  `);

}

function savePrayerItem(id){

  const text =
  document.getElementById("prayerInput")
  .value.trim();

  if(!text) return;

  const theme =
  state.prayers.find(t=>t.id===id);

  theme.items.push({

    id:Date.now().toString(),
    text,
    checked:false,
    answered:false

  });

  save();

  openPrayerTheme(id);

  renderPrayers();

}

function togglePrayer(themeId,itemId){

  const theme =
  state.prayers.find(t=>t.id===themeId);

  const item =
  theme.items.find(i=>i.id===itemId);

  item.checked = !item.checked;

  save();

  openPrayerTheme(themeId);

}

function answerPrayer(themeId,itemId){

  const theme =
  state.prayers.find(t=>t.id===themeId);

  const item =
  theme.items.find(i=>i.id===itemId);

  item.answered = true;

  save();

  openPrayerTheme(themeId);

  renderPrayers();

}

function renderSettings(){

  const settings =
  document.getElementById("settings");

  settings.innerHTML = `

    <div class="hero-date">
      Préférences
    </div>

    <div class="hero-title">
      Votre<br>
      ambiance
    </div>

    <div class="hero-sub">
      Personnalisez votre expérience
      spirituelle.
    </div>

    <div class="section">

      <div class="card glass">

        <div class="section-title"
        style="margin-bottom:18px">

        Profil

        </div>

        <input
        value="${state.profile.name || ''}"
        onchange="updateName(this.value)">

      </div>

    </div>

    <div class="section">

      <div class="card glass">

        <div class="section-title"
        style="margin-bottom:18px">

        Notifications UI

        </div>

        ${switchRow(
          "Rappel prière",
          "prayer"
        )}

        ${switchRow(
          "Rappel méditation",
          "meditation"
        )}

        ${switchRow(
          "Rappel réunion",
          "meeting"
        )}

        ${switchRow(
          "Rappel culte",
          "worship"
        )}

        ${switchRow(
          "Encouragement spirituel",
          "encouragement"
        )}

        ${switchRow(
          "Rappel jeûne",
          "fasting"
        )}

      </div>

    </div>

  `;

}

function switchRow(label,key){

  return `

    <div class="switch-row">

      <div>${label}</div>

      <div
      class="switch
      ${
        state.settings.notifications[key]
        ? 'active':''
      }"
      onclick="toggleSwitch('${key}')">

      </div>

    </div>

  `;

}

function toggleSwitch(key){

  state.settings.notifications[key] =
  !state.settings.notifications[key];

  save();

  renderSettings();

}

function updateName(v){

  state.profile.name = v;

  save();

  renderHome();

}

function openSheet(content){

  document.getElementById("sheetContent")
  .innerHTML = content;

  document.getElementById("overlay")
  .classList.add("active");

  document.getElementById("sheet")
  .classList.add("active");

}

function closeSheet(){

  document.getElementById("overlay")
  .classList.remove("active");

  document.getElementById("sheet")
  .classList.remove("active");

}

document.getElementById("overlay")
.onclick = closeSheet;

function renderAll(){

  renderHome();
  renderPlanner();
  renderJournal();
  renderPrayers();
  renderSettings();

}

renderAll();

document.querySelectorAll(".nav-item")
.forEach(item=>{

  item.onclick=()=>{

    document.querySelectorAll(".nav-item")
    .forEach(i=>i.classList.remove("active"));

    item.classList.add("active");

    const page =
    item.dataset.page;

    document.querySelectorAll(".page")
    .forEach(p=>p.classList.remove("active"));

    document.getElementById(page)
    .classList.add("active");

    updateFab(page);

  };

});

function updateFab(page){

  const fab =
  document.getElementById("fab");

  if(page==="home") fab.innerHTML = "◐";
  if(page==="planner") fab.innerHTML = "＋";
  if(page==="journal") fab.innerHTML = "✎";
  if(page==="prayers") fab.innerHTML = "🙏";
  if(page==="settings") fab.innerHTML = "⚙";

}

document.getElementById("fab")
.onclick = ()=>{

  const current =
  document.querySelector(".page.active")
  .id;

  if(current==="planner"){
    openPlannerDay(todayKey());
  }

  if(current==="journal"){
    openJournal();
  }

  if(current==="prayers"){
    newPrayerTheme();
  }

  if(current==="home"){
    openThemeSelector();
  }

  if(current==="settings"){
    openThemeSelector();
  }

};

function openThemeSelector(){

  openSheet(`

    <div class="section-title"
    style="margin-bottom:26px">

    Choisir une ambiance

    </div>

    <div class="theme-picker">

      <div class="theme-dot"
      onclick="quickTheme('sand')"
      style="background:#d8c1a0"></div>

      <div class="theme-dot"
      onclick="quickTheme('rose')"
      style="background:#d6adb2"></div>

      <div class="theme-dot"
      onclick="quickTheme('sage')"
      style="background:#aab6a2"></div>

      <div class="theme-dot"
      onclick="quickTheme('dark')"
      style="background:#1c1d22"></div>

      <div class="theme-dot"
      onclick="quickTheme('night')"
      style="background:#28344a"></div>

    </div>

  `);

}

function quickTheme(theme){

  applyTheme(theme);

  renderAll();

  closeSheet();

}

</script>

</body>
</html>
